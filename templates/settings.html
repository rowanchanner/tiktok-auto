{% extends "base.html" %}

{% block content %}
<div class="glass-card" style="max-width: 600px;">
    <h1>Settings</h1>
    <form action="/settings" method="POST">
        <div class="form-group" style="display: flex; align-items: center; gap: 0.5rem; margin-bottom: 2rem;">
            <input type="checkbox" id="is_running" name="is_running" {% if not settings or settings.is_running %}checked{% endif %} style="width: 1.25rem; height: 1.25rem;">
            <label for="is_running" style="margin-bottom: 0; font-size: 1rem; color: white;">Enable Auto Posting</label>
        </div>

        <div class="form-group">
            <label for="interval">Post Interval (Hours)</label>
            <input type="number" id="interval" name="interval" class="form-control" value="{{ settings.post_interval_hours if settings else 3 }}" min="1" max="24">
        </div>

        <div class="form-group">
            <label for="max_posts">Max Posts Per Day</label>
            <input type="number" id="max_posts" name="max_posts" class="form-control" value="{{ settings.max_posts_per_day if settings else 15 }}" min="1">
        </div>

        <div class="form-group">
            <label for="min_views">Minimum Views for Viral Clips</label>
            <input type="number" id="min_views" name="min_views" class="form-control" value="{{ settings.min_views if settings else 500000 }}" min="10000">
        </div>

        <div class="form-group">
            <label for="hashtags">Discovery Hashtags (comma separated)</label>
            <input type="text" id="hashtags" name="hashtags" class="form-control" value="{{ settings.hashtags if settings else 'movieclips,moviescenes,filmtok' }}">
        </div>

        <div class="form-group">
            <label for="extra_hashtags">Extra Hashtags to Add to Posts (comma separated)</label>
            <input type="text" id="extra_hashtags" name="extra_hashtags" class="form-control" value="{{ settings.extra_hashtags if settings else '' }}" placeholder="e.g., #foryou,#viral">
        </div>

        <button type="submit" class="btn btn-success"><i class="fa-solid fa-floppy-disk"></i> Save Settings</button>
    </form>
</div>
{% endblock %}
